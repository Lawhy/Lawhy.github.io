<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}} — Yuan He</title>
  <meta name="description" content="{{description}}">
  <link rel="canonical" href="{{canonical_url}}">
  <link rel="alternate" type="application/rss+xml" title="Yuan He — RSS" href="/feed.xml">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Yuan He">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:url" content="{{canonical_url}}">
  <meta property="og:image" content="{{og_image}}">
  <meta name="twitter:card" content="{{twitter_card}}">
  <meta name="twitter:title" content="{{title}}">
  <meta name="twitter:description" content="{{description}}">
  <meta name="twitter:image" content="{{og_image}}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{root}}assets/images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="{{root}}assets/images/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="{{root}}assets/images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
  <link rel="stylesheet" href="{{root}}assets/css/site.css?v={{css_v_site}}">
  <link rel="stylesheet" href="{{root}}assets/css/syntax.css?v={{css_v_syntax}}">
</head>
<body>
  <main class="page">
    <header class="page__hero page__hero--post">
      <a class="post-back" href="{{root}}">← Yuan He</a>
      <h1 class="post-title">{{title}}</h1>
      <p class="post-meta">{{authors_line}}{{date_display}}{{meta_extra}}</p>
    </header>

    <div class="page__shell">
      <nav class="left-toc" aria-label="Table of contents">
        <span class="toc-marker" aria-hidden="true"></span>
        <ul>
{{toc}}
        </ul>
      </nav>

      <article class="content">
        <div class="post-body post-body--{{category}}">
{{content}}
        </div>
        <section class="post-comments" aria-label="Comments">
          <h2 class="post-comments__title">Discussion</h2>
          <script src="https://giscus.app/client.js"
                  data-repo="Lawhy/Lawhy.github.io"
                  data-repo-id="R_kgDOM4-hvA"
                  data-category="General"
                  data-category-id="DIC_kwDOM4-hvM4C9N4S"
                  data-mapping="pathname"
                  data-strict="0"
                  data-reactions-enabled="1"
                  data-emit-metadata="0"
                  data-input-position="top"
                  data-theme="https://yuanhe.wiki/assets/css/giscus.css"
                  data-lang="en"
                  data-loading="lazy"
                  crossorigin="anonymous"
                  async></script>
        </section>
      </article>
    </div>

    <footer class="page-footer">
      <span>&copy; 2026 Yuan He</span>
      <span class="page-footer__views" id="pagevisits" hidden></span>
    </footer>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"
    onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}], throwOnError: false});"></script>
  <script src="{{root}}assets/js/scrollspy.js" defer></script>
  <script data-goatcounter="https://yuanhe.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <script src="{{root}}assets/js/goatcounter.js" defer></script>
</body>
</html>
