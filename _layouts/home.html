<!DOCTYPE html>
<!--[if lt IE 7]><html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if (IE 7)&!(IEMobile)]><html class="no-js lt-ie9 lt-ie8"><![endif]-->

<head>
    {% include head.html %}
</head>
<body>
    {% include nav.html %}
    <!-- Header -->
    <header class="header flex" role="banner">
        <div class="container animated fadeIn">
            <div class="row">
                    <a href="{{ site.url }}">
                        <img src="{{ site.logo }}" class="img-circle zoombtn animated rotateIn">
                    </a>
                    <h3 class="title">
                        <div class="row">
                          <div class="column">
                              <a class="zoombtn" href="{{ site.url }}">
                                  <p style="font-size: 1.2em; font-weight:300">
                                      <strong>{{ site.title }}</strong> (何源)
                                  </p>
                                  <span style="font-family: 楷体; font-size: 1.2em; font-weight:300">
                                      <strong>{{ site.title }}</strong> (何源)
                                  </span>
                              </a>
                          </div>
                          <div class="column">
                            <img src="{{ site.badge }}" class="img-responsive" style="max-height:35px;">
                          </div>
                        </div>
                        <style>
                            * {
                              box-sizing: border-box;
                            }

                            .column {
                              float: left;
                              width: 48%;
                              padding: 5px;
                            }

                            /* Clearfix (clear floats) */
                            .row::after {
                              content: "";
                              clear: both;
                              display: table;
                            }
                        </style>
                    </h3>
                    <hr class="hr-line">
                    <h3 class="title">
                        <a href="https://www.cs.ox.ac.uk/people/yuan.he/">
                        	<p style="font-size:1rem;font-weight:300"><dfn><strong>{{ site.bio }}</strong></dfn></p>
			            </a>
                        <!-- <p style="font-size:1rem;font-weight:300;color=gray"><dfn>Cogito, ergo sum.</dfn></p> -->
                    </h3>
                    <hr class="hr-line">
                    <h3 class="title">
                        <a href="https://www.cs.ox.ac.uk/">
                        	<p style="font-size:1rem;font-weight:300">{{ site.dept }}</p>
			            </a>
                    </h3>
                    <h3 class="title">
                        <a href="https://www.ox.ac.uk/">
                        	<p style="font-size:1rem;font-weight:300">{{ site.uni }}</p>
			            </a>
                    </h3>
                    {% include social-links.html %}
                  <hr class="hr-line">
                  <h3 class="title">
                         <a class="btn zoombtn" href="{{ site.url }}/about">
                         About
                         </a>
                         <a class="btn zoombtn" href="{{ site.url }}/posts">
                         Posts
                         </a>
                         <a class="btn zoombtn" href="https://scholar.google.com/citations?hl=en&user=sCXUhQcAAAAJ">
                         Publications
                         </a>
                         <a class="btn zoombtn" href="https://github.com/Lawhy/resume/raw/main/CV.pdf">
                         Resume
                         </a>
                         <!-- 
                         <a class="btn zoombtn" href="{{ site.url }}/projects">
                         Projects
                         </a> 
                         -->
                 </h3>
            </div>
        </div>
    </header>
    {% include scripts.html %}
</body>
</html>
