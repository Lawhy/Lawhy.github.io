<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>From Agent Loops to Agent Environments</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Source+Code+Pro:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/slides.css">
</head>

<body>

  <div class="deck" id="deck"></div>

  <div class="progress" id="progress"></div>
  <div class="hint" id="hint">&larr; &rarr; to navigate &middot; Space for details</div>

  <script>
    (function () {
      var slideFiles = [
        '01-title.html',
        '02-agent-loop.html',
        '03-hooks.html',
        '04-gym-interface.html',
        '05-full-picture.html',
        '06-challenges.html',
        '07-act-correctness.html',
        '08-tito.html',
        '09-retokenization-drift.html',
        '10-chat-template.html',
        '11-token-metadata.html',
        '12-tool-parsing.html',
        '13-strict-parsing.html',
        '14-termination.html',
        '15-act-efficiency.html',
        '16-async.html',
        '17-distribution.html',
        '18-tool-execution.html',
        '19-fully-async.html',
      ];

      var deck = document.getElementById('deck');

      Promise.all(slideFiles.map(function (f) {
        return fetch(f).then(function (r) { return r.text(); });
      })).then(function (htmls) {
        deck.innerHTML = htmls.join('\n');

        // Ensure only the first slide is active
        var slides = deck.querySelectorAll('.slide');
        slides.forEach(function (s, i) {
          if (i === 0) s.classList.add('active');
          else s.classList.remove('active');
        });

        // Load the slide engine after DOM is ready
        var script = document.createElement('script');
        script.src = '/assets/js/slides.js';
        document.body.appendChild(script);
      });
    })();
  </script>

</body>

</html>
