<section class="slide" data-toc="Fully async">
  <div class="slide-inner">
    <h2>Fully Async Rollouts</h2>
    <p>The trainer stops waiting for a synced batch and updates from
      whatever&rsquo;s ready.</p>

    <svg class="async-diagram" viewBox="0 0 1440 330" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="aarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7"
          orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#141413" />
        </marker>
        <marker id="aarr-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8"
          orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97757" />
        </marker>
      </defs>

      <!-- policy versions advancing; θ3 = current (training) policy -->
      <rect x="130" y="40" width="140" height="54" rx="8" fill="#f0efeb" stroke="#141413" stroke-width="1.5" />
      <text x="200" y="75" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="27"
        fill="#141413">&#952;&#8320;</text>
      <line x1="270" y1="67" x2="477" y2="67" stroke="#141413" stroke-width="1.5" marker-end="url(#aarr)" />

      <rect x="477" y="40" width="140" height="54" rx="8" fill="#f0efeb" stroke="#141413" stroke-width="1.5" />
      <text x="547" y="75" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="27"
        fill="#141413">&#952;&#8321;</text>
      <line x1="617" y1="67" x2="823" y2="67" stroke="#141413" stroke-width="1.5" marker-end="url(#aarr)" />

      <rect x="823" y="40" width="140" height="54" rx="8" fill="#f0efeb" stroke="#141413" stroke-width="1.5" />
      <text x="893" y="75" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="27"
        fill="#141413">&#952;&#8322;</text>
      <line x1="963" y1="67" x2="1170" y2="67" stroke="#141413" stroke-width="1.5" marker-end="url(#aarr)" />

      <rect x="1170" y="40" width="140" height="54" rx="8" fill="#d97757" stroke="#d97757" stroke-width="1.5" />
      <text x="1240" y="75" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="27"
        fill="#faf9f5">&#952;&#8323;</text>

      <!-- each live policy hands off and generates the next stretch of turns -->
      <line x1="200" y1="94" x2="200" y2="190" stroke="#6b6b66" stroke-width="1.5" stroke-dasharray="5 4" />
      <line x1="547" y1="94" x2="547" y2="190" stroke="#6b6b66" stroke-width="1.5" stroke-dasharray="5 4" />
      <line x1="893" y1="94" x2="893" y2="190" stroke="#6b6b66" stroke-width="1.5" stroke-dasharray="5 4" />

      <!-- one rollout, segmented across the live policies -->
      <rect x="200" y="190" width="1040" height="58" rx="8" fill="rgba(217,119,87,0.1)" stroke="#d97757"
        stroke-width="1.5" />
      <line x1="547" y1="190" x2="547" y2="248" stroke="#d97757" stroke-width="1.5" />
      <line x1="893" y1="190" x2="893" y2="248" stroke="#d97757" stroke-width="1.5" />
      <text x="373" y="228" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="27"
        fill="#141413">turns @ &#952;&#8320;</text>
      <text x="720" y="228" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="27"
        fill="#141413">turns @ &#952;&#8321;</text>
      <text x="1066" y="228" text-anchor="middle" font-family="Source Code Pro, monospace" font-size="27"
        fill="#141413">turns @ &#952;&#8322;</text>

      <!-- consumed / trained at θ3 -->
      <line x1="1240" y1="190" x2="1240" y2="98" stroke="#d97757" stroke-width="2.5" marker-end="url(#aarr-acc)" />

      <!-- annotation -->
      <path d="M 200 272 L 200 286 L 1240 286 L 1240 272" stroke="#d97757" stroke-width="1.5" fill="none" />
      <text x="720" y="322" text-anchor="middle" font-family="Inter, sans-serif" font-size="25" font-weight="600"
        fill="#d97757">one rollout, generated by &#952;&#8320; &middot; &#952;&#8321; &middot; &#952;&#8322;
        &mdash; used to update the current policy &#952;&#8323;</text>
    </svg>

    <div class="async-caveats">
      <p class="async-risk">Stale rollouts are the trade-off: higher throughput, but more <span
          class="accent">off-policy</span> data. How much staleness is tolerable is empirical.</p>
    </div>
  </div>
</section>
